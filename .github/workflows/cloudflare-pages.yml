name: "Deploy to Cloudflare Pages"

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: "Install dependencies"
        run: |
          npm ci
      - name: "Build"
        run: |
          npm run build
      - name: Apply Cloudflare D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: "d1 migrations apply liahona-ledger --remote"
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: "pages deploy .svelte-kit/cloudflare --project-name=liahona-ledger --branch=${{ github.ref_name }}"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
