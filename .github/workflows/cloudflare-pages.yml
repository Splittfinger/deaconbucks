name: "Deploy to Cloudflare Pages"

on:
  push:
    branches:
      - "main"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "package-lock.json"
      - name: "Install dependencies"
        run: |
          npm ci
      - name: Detect Cloudflare deploy credentials
        id: cloudflare-auth
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare deploy skipped because CLOUDFLARE_ACCOUNT_ID and/or CLOUDFLARE_API_TOKEN is not configured."
          fi
      - name: "Build"
        run: |
          npm run build
      - name: Apply Cloudflare D1 migrations
        if: steps.cloudflare-auth.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: "d1 migrations apply liahona-ledger --remote"
      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare-auth.outputs.available == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: "pages deploy .svelte-kit/cloudflare --project-name=liahona-ledger --branch=${{ github.ref_name }}"
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
